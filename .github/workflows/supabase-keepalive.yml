name: Supabase Keepalive

on:
  schedule:
    # Ogni 3 giorni alle 06:00 UTC (ben sotto la soglia 7 giorni del free tier)
    - cron: '0 6 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL}" ]; then
            echo "Missing secret: SUPABASE_URL" >&2
            exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing secret: SUPABASE_ANON_KEY" >&2
            exit 1
          fi

      - name: Ping Supabase wines table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          BASE_URL="${SUPABASE_URL%/}"
          URL="${BASE_URL}/rest/v1/wines?select=id&limit=1"
          HTTP_CODE="$(curl -sS -o /tmp/response.json -w '%{http_code}' \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${URL}")"

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Supabase keepalive failed with HTTP ${HTTP_CODE}" >&2
            cat /tmp/response.json >&2 || true
            exit 1
          fi

          echo "Supabase keepalive OK (HTTP ${HTTP_CODE})"
